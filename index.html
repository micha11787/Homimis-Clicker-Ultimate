<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Homimis Clicker: Ultimate</title>
<link rel="stylesheet" href="grid.css">
<link rel="stylesheet" href="style.css">
</head>

<body>

<button id="logout-btn" style="position:absolute; top:10px; right:10px;"></button>

<div class="content">

<div class="container">
<h2><img src="Снимок экрана 2026-03-12 211303.png" alt="homimis clicker ultimate"></h2>

<div class="stat">Клики: <b id="clicks">0</b></div>
<div class="stat">Сила клика: <b id="cpc">1</b> (x<span id="mult-val">1</span>)</div>
<div class="stat">Автоклик: <b id="auto-val">0</b> сек.</div>

<div class="shop">
<p><b>Магазин:</b></p>

<button id="buy-power" class="shop-btn">
Улучшить клик (+1) — Цена: 100
</button>

<button id="buy-auto" class="shop-btn">
Купить Автоклик (+1/сек) — Цена: 500
</button>

<button id="rebirth" class="shop-btn reb">
Перерождение — Цена: 2000
</button>

</div>

<button id="btn-main">КЛИКАТЬ!</button>
</div>

<div class="leaderboard container">
<h1>Leaderboard</h1>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>

const firebaseConfig = {
apiKey: "AIzaSyDgbu83QS0FIW4fO1-nfeq_CqMS2DpECow",
authDomain: "homimis-clicker-ultimate.firebaseapp.com",
databaseURL: "https://homimis-clicker-ultimate-default-rtdb.europe-west1.firebasedatabase.app",
projectId: "homimis-clicker-ultimate",
storageBucket: "homimis-clicker-ultimate.firebasestorage.app",
messagingSenderId: "1070878684087",
appId: "1:1070878684087:web:39dfb0f6c9429291aa6e32",
measurementId: "G-3PWQE85YNB"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const currentUser = localStorage.getItem('currentUser');

if (!currentUser) {
window.location.href = "login.html";
}

const userKey = `clicker_data_${currentUser}`;

let savedData = JSON.parse(localStorage.getItem(userKey)) || {};

let score = Number(savedData.score) || 0;
let power = Number(savedData.power) || 1;
let auto = Number(savedData.auto) || 0;
let reb = Number(savedData.reb) || 0;

let powerPrice = Number(savedData.powerPrice) || 100;
let autoPrice = Number(savedData.autoPrice) || 500;
let rebcost = Number(savedData.rebcost) || 2000;

let multiplier = reb + 1;

const display = document.getElementById("clicks");
const powerDisplay = document.getElementById("cpc");
const autoDisplay = document.getElementById("auto-val");
const leaderboardDiv = document.querySelector(".leaderboard");

function updateUI(){

multiplier = reb + 1;

display.innerText = Math.floor(score);
powerDisplay.innerText = power;
autoDisplay.innerText = auto;

document.getElementById("mult-val").innerText = multiplier;

document.getElementById("buy-power").innerText =
`Улучшить клик (+1) — Цена: ${Math.floor(powerPrice)}`;

document.getElementById("buy-auto").innerText =
`Купить Автоклик (+1/сек) — Цена: ${Math.floor(autoPrice)}`;

document.getElementById("rebirth").innerText =
`Перерождение — Цена: ${Math.floor(rebcost)}`;

localStorage.setItem(userKey, JSON.stringify({
score,
power,
auto,
reb,
powerPrice,
autoPrice,
rebcost
}));

db.ref("leaderboard/"+currentUser).set({
name:currentUser,
score:score
});

}

function renderLeaderboard(){

db.ref("leaderboard")
.orderByChild("score")
.limitToLast(10)
.on("value", snapshot=>{

leaderboardDiv.innerHTML="<h1>Leaderboard</h1>";

let players=[];

snapshot.forEach(child=>{
players.push(child.val());
});

players.reverse();

players.forEach((player,index)=>{

const div=document.createElement("div");

if(player.name===currentUser){
div.style.color="gold";
div.style.fontWeight="bold";
}

div.innerHTML=`${index+1}. ${player.name} — ${Math.floor(player.score)}`;

leaderboardDiv.appendChild(div);

});

});

}

document.getElementById("btn-main").onclick=()=>{
score += power * multiplier;
updateUI();
};

document.getElementById("buy-power").onclick=()=>{

if(score>=powerPrice){

score-=powerPrice;
power+=1;
powerPrice=Math.floor(powerPrice*1.5);

updateUI();

}

};

document.getElementById("buy-auto").onclick=()=>{

if(score>=autoPrice){

score-=autoPrice;
auto+=1;
autoPrice=Math.floor(autoPrice*1.5);

updateUI();

}

};

document.getElementById("rebirth").onclick=()=>{

if(score>=rebcost){

score=0;
power=1;
auto=0;

reb+=1;

rebcost=Math.floor(rebcost*2);

powerPrice=100;
autoPrice=500;

updateUI();

}

};

setInterval(()=>{

if(auto>0){
score += auto * multiplier;
updateUI();
}

},1000);

renderLeaderboard();
updateUI();

</script>

</body>
</html>
